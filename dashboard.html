<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Executive Console — Wallovo AI</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <!-- Dynamic Tailwind CSS & System Styling -->
    <link rel="stylesheet" href="/src/index.css" />
    <style>
      /* Custom grid lines overlay */
      .subsurface-grid {
        background-image: 
          linear-gradient(rgba(0, 240, 255, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(0, 240, 255, 0.03) 1px, transparent 1px);
        background-size: 30px 30px;
        background-position: center;
      }
    </style>
  </head>
  <body class="min-h-screen text-slate-300 selection:bg-cyan-500/30 selection:text-white bg-[#000000] relative overflow-x-hidden">
    <!-- Cinematic backgrounds -->
    <div class="absolute inset-0 z-0 subsurface-grid opacity-50 pointer-events-none"></div>
    <!-- Cyan glow -->
    <div class="absolute top-1/4 left-1/2 w-[600px] h-[600px] bg-cyan-500/5 rounded-full blur-[140px] pointer-events-none animate-pulse" style="animation-duration: 10s;"></div>
    
    <div id="dashboard-root" class="relative z-10 min-h-screen h-full"></div>
    <script type="module" src="/src/pages/Dashboard.jsx"></script>
  </body>
</html>
