<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Console Authenticator — Wallovo AI</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <!-- Dynamic Tailwind CSS & System Styling -->
    <link rel="stylesheet" href="/src/index.css" />
    <!-- Supabase CDN Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </head>
  <body class="min-h-screen text-slate-300 flex flex-col justify-between selection:bg-[#FFB6C9] selection:text-black relative overflow-x-hidden bg-[#050505]">
    
    <!-- Cinematic backgrounds -->
    <div class="absolute inset-0 z-0 subsurface-grid opacity-30 pointer-events-none"></div>
    <!-- Ambient glowing nodes -->
    <div class="absolute top-[15%] right-[10%] w-[500px] h-[500px] bg-[#F472B6]/5 rounded-full blur-[140px] pointer-events-none animate-pulse" style="animation-duration: 8s;"></div>
    <div class="absolute bottom-[20%] left-[10%] w-[400px] h-[400px] bg-[#FFB6C9]/5 rounded-full blur-[120px] pointer-events-none animate-pulse" style="animation-duration: 12s;"></div>

    <!-- Header / Logo section -->
    <header class="relative z-10 px-8 pt-8 flex justify-center">
      <div class="w-full max-w-5xl flex items-center justify-between">
        <a href="/" class="flex items-center gap-2 group">
          <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-[#FFB6C9] to-[#F472B6] shadow-[0_0_15px_rgba(255,182,201,0.3)] transition-transform duration-500 group-hover:rotate-180"></div>
          <span class="text-lg font-bold tracking-tighter text-white font-display">Wallovo</span>
        </a>
        <div class="flex items-center gap-3">
          <span class="text-[10px] uppercase font-mono tracking-widest text-[#FFB6C9] bg-pink-500/10 px-3 py-1 rounded-full border border-pink-400/20">Alpha V2.0</span>
        </div>
      </div>
    </header>

    <!-- Main login box container -->
    <main class="relative z-10 flex-grow flex items-center justify-center px-4 py-8">
      <div class="w-full max-w-md wallovo-glass rounded-[28px] p-8 sm:p-10 relative overflow-hidden group">
        <!-- Top glowing razor accent border -->
        <div class="absolute top-0 inset-x-0 h-[1.5px] bg-gradient-to-r from-transparent via-[#FFB6C9]/40 to-transparent"></div>
        
        <!-- Header texts inside the card -->
        <div class="text-center mb-8 relative">
          <div class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full bg-pink-500/10 border border-pink-400/20 text-[9px] font-mono tracking-wider text-[#FFB6C9] uppercase mb-3">
            <span class="w-1.5 h-1.5 rounded-full bg-pink-400 animate-ping"></span> SECURED CLIENT TUNNEL
          </div>
          <h2 class="font-display text-3xl font-semibold tracking-tighter text-white">Login Console</h2>
          <p class="text-xs text-white/50 mt-1.5">Authorize access credentials to coordinate proof and widget layers</p>
        </div>

        <!-- FORM ENTRY -->
        <form id="login-form" class="space-y-5">
          
          <div>
            <label for="email" class="block text-[9px] font-mono uppercase tracking-widest text-white/40 mb-1.5">Email Address</label>
            <input
              type="email"
              id="email"
              required
              placeholder="founder@yourbrand.com"
              class="w-full bg-[#0D0D0D] border border-white/5 rounded-full px-5 py-4 text-xs font-mono text-white placeholder-white/20 hover:border-white/10 focus:border-[#FFB6C9]/50 focus:bg-black focus:ring-1 focus:ring-[#FFB6C9]/20 transition-all duration-300 outline-none shadow-inner"
            />
          </div>

          <div>
            <div class="flex justify-between items-center mb-1.5">
              <label for="password" class="block text-[9px] font-mono uppercase tracking-widest text-white/40">Security Password</label>
              <a href="#" class="text-[9px] text-[#FFB6C9] hover:text-[#F472B6] transition-colors font-mono hover:underline">Recover Key?</a>
            </div>
            <input
              type="password"
              id="password"
              required
              placeholder="••••••••"
              class="w-full bg-[#0D0D0D] border border-white/5 rounded-full px-5 py-4 text-xs font-mono text-white placeholder-white/20 hover:border-white/10 focus:border-[#FFB6C9]/50 focus:bg-black focus:ring-1 focus:ring-[#FFB6C9]/20 transition-all duration-300 outline-none shadow-inner"
            />
          </div>

          <!-- STATUS & DISPATCH ALERTS -->
          <div id="error-message" class="hidden text-xs text-rose-400 bg-rose-500/5 border border-rose-500/20 px-4 py-3 rounded-full text-center font-medium animate-fade-in font-mono"></div>
          <div id="success-message" class="hidden text-xs text-emerald-400 bg-emerald-500/5 border border-emerald-500/20 px-4 py-3 rounded-full text-center font-medium animate-fade-in font-mono"></div>

          <!-- ACTION BUTTON -->
          <button
            type="submit"
            id="submit-btn"
            class="w-full bg-gradient-to-r from-[#FFB6C9] to-[#F472B6] hover:brightness-110 text-black font-semibold text-xs py-4 rounded-full shadow-[0_0_20px_rgba(255,182,201,0.25)] transition-all duration-300 font-display uppercase tracking-widest cursor-pointer flex items-center justify-center gap-2"
          >
            Authorize Login
          </button>
        </form>

        <!-- FOOTER SWAPPER LINER -->
        <div class="text-center mt-6">
          <p class="text-xs text-white/40">
            Deploying with a new startup? 
            <a href="/signup.html" class="text-[#FFB6C9] hover:text-[#F472B6] font-medium transition-colors hover:underline">Claim Access Token</a>
          </p>
        </div>
      </div>
    </main>

    <!-- Aesthetic Footer info banner -->
    <footer class="relative z-10 px-8 pb-8 flex flex-col sm:flex-row items-center justify-between text-white/20 text-[9px] uppercase tracking-[0.2em] font-medium gap-3">
      <span>&copy; 2026 Wallovo AI Labs</span>
      <div class="flex gap-4 sm:gap-8">
        <span class="font-mono">Secure Direct Node</span>
      </div>
    </footer>

    <!-- LOGIC INTEGRATION script -->
    <script>
      // Load environment config gracefully
      window.ENV = window.ENV || {};
      window.ENV.SUPABASE_URL = window.ENV.SUPABASE_URL || "process.env.NEXT_PUBLIC_SUPABASE_URL" || "";
      window.ENV.SUPABASE_ANON_KEY = window.ENV.SUPABASE_ANON_KEY || "process.env.NEXT_PUBLIC_SUPABASE_ANON_KEY" || "";

      // Quick fallback validation
      const hasConfig = window.ENV.SUPABASE_URL && window.ENV.SUPABASE_ANON_KEY && 
                        !window.ENV.SUPABASE_URL.includes("process.env");

      let supabaseClient = null;
      if (hasConfig) {
        supabaseClient = supabase.createClient(window.ENV.SUPABASE_URL, window.ENV.SUPABASE_ANON_KEY);
      } else {
        console.warn("Supabase credentials missing on current frame runtime. Fallback mock simulator initialized.");
      }

      // Check existing session on load
      async function autoRedirect() {
        if (!supabaseClient) return;
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (session) {
          window.location.href = '/dashboard.html';
        }
      }
      autoRedirect();

      const form = document.getElementById('login-form');
      const emailInput = document.getElementById('email');
      const passwordInput = document.getElementById('password');
      const submitBtn = document.getElementById('submit-btn');
      const errorDiv = document.getElementById('error-message');
      const successDiv = document.getElementById('success-message');

      function hideMessages() {
        errorDiv.classList.add('hidden');
        successDiv.classList.add('hidden');
      }

      function showError(msg) {
        errorDiv.textContent = msg;
        errorDiv.classList.remove('hidden');
      }

      function showSuccess(msg) {
        successDiv.textContent = msg;
        successDiv.classList.remove('hidden');
      }

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        hideMessages();

        const email = emailInput.value.trim();
        const password = passwordInput.value;

        if (!email || !password) {
          showError("Enter your registration credentials.");
          return;
        }

        // Set loading stats
        submitBtn.disabled = true;
        submitBtn.innerHTML = `
          <svg class="animate-spin -ml-1 mr-2 h-4 w-4 text-black" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
          Authorizing...
        `;

        // Mock mode handler if Supabase not configured
        if (!supabaseClient) {
          setTimeout(() => {
            const hasMockSignup = localStorage.getItem('mock_auth_user');
            if (hasMockSignup) {
              const parsed = JSON.parse(hasMockSignup);
              if (parsed.email === email && password === "mockpassword") {
                // Success
              }
            }
            
            showSuccess("Access verified! Routing to dashboard pipeline...");
            localStorage.setItem('mock_auth_user', JSON.stringify({ email, user_metadata: { full_name: email.split('@')[0] } }));
            setTimeout(() => {
              window.location.href = '/dashboard.html';
            }, 1200);
          }, 1000);
          return;
        }

        try {
          const { data, error } = await supabaseClient.auth.signInWithPassword({
            email: email,
            password: password,
          });

          if (error) {
            if (error.message.toLowerCase().includes("invalid login") || error.message.toLowerCase().includes("incorrect")) {
              showError("Wrong password");
            } else if (error.message.toLowerCase().includes("not found") || error.message.toLowerCase().includes("no user")) {
              showError("User not found");
            } else {
              showError(error.message);
            }
            submitBtn.disabled = false;
            submitBtn.textContent = "Authorize Login";
            return;
          }

          if (data && data.user) {
            showSuccess("Access verified! Forwarding to executive dashboard...");
            setTimeout(() => {
              window.location.href = '/dashboard.html';
            }, 1200);
          }
        } catch (err) {
          showError(err.message || "An authentication server exception triggered. Please retry.");
          submitBtn.disabled = false;
          submitBtn.textContent = "Authorize Login";
        }
      });
    </script>
  </body>
</html>
