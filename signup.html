<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Authorize Access — Wallovo AI</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <!-- Dynamic Tailwind CSS & System Styling -->
    <link rel="stylesheet" href="/src/index.css" />
  </head>
  <body class="min-h-screen text-slate-300 flex flex-col justify-between selection:bg-[#FFB6C9] selection:text-black relative overflow-x-hidden bg-[#050505]">
    
    <!-- Cinematic backgrounds -->
    <div class="absolute inset-0 z-0 subsurface-grid opacity-30 pointer-events-none"></div>
    <!-- Ambient glowing nodes -->
    <div class="absolute top-[15%] left-[10%] w-[500px] h-[500px] bg-[#F472B6]/5 rounded-full blur-[140px] pointer-events-none animate-pulse" style="animation-duration: 8s;"></div>
    <div class="absolute bottom-[20%] right-[10%] w-[400px] h-[400px] bg-[#FFB6C9]/5 rounded-full blur-[120px] pointer-events-none animate-pulse" style="animation-duration: 12s;"></div>

    <!-- Header / Logo section -->
    <header class="relative z-10 px-8 pt-8 flex justify-center">
      <div class="w-full max-w-5xl flex items-center justify-between">
        <div class="flex items-center gap-4">
          <a href="/index.html" class="flex items-center gap-2 group">
            <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-[#FFB6C9] to-[#F472B6] shadow-[0_0_15px_rgba(255,182,201,0.3)] transition-transform duration-500 group-hover:rotate-180"></div>
            <span class="text-lg font-bold tracking-tighter text-white font-display group-hover:text-[#FFB6C9] transition-colors">Wallovo</span>
          </a>
          <a href="/index.html" class="text-[9px] text-[#FFB6C9] bg-pink-500/10 border border-pink-500/20 hover:bg-[#FFB6C9]/15 hover:border-[#FFB6C9]/40 font-mono tracking-widest uppercase px-3 py-1 rounded-full transition-all duration-300">
            ← Home
          </a>
        </div>
        <div class="flex items-center gap-3">
          <span class="text-[10px] uppercase font-mono tracking-widest text-[#FFB6C9] bg-pink-500/10 px-3 py-1 rounded-full border border-pink-400/20">Alpha V2.0</span>
        </div>
      </div>
    </header>

    <!-- Main signup box container -->
    <main class="relative z-10 flex-grow flex items-center justify-center px-4 py-8">
      <div class="w-full max-w-md wallovo-glass rounded-[28px] p-8 sm:p-10 relative overflow-hidden group">
        <!-- Top glowing razor accent border -->
        <div class="absolute top-0 inset-x-0 h-[1.5px] bg-gradient-to-r from-transparent via-[#FFB6C9]/40 to-transparent"></div>
        
        <!-- Header texts inside the card -->
        <div class="text-center mb-8 relative">
          <div class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full bg-pink-500/10 border border-pink-400/20 text-[9px] font-mono tracking-wider text-[#FFB6C9] uppercase mb-3">
            <span class="w-1.5 h-1.5 rounded-full bg-pink-400 animate-ping"></span> SECURED CLIENT TUNNEL
          </div>
          <h2 class="font-display text-3xl font-semibold tracking-tighter text-white">Create Account</h2>
          <p class="text-xs text-white/50 mt-1.5">Sign up to claim your corporate test suite and widgets</p>
        </div>

        <!-- FORM ENTRY -->
        <form id="signup-form" class="space-y-4">
          
          <div>
            <label for="full-name" class="block text-[9px] font-mono uppercase tracking-widest text-white/40 mb-1.5">Full Name</label>
            <input
              type="text"
              id="full-name"
              required
              placeholder="e.g. Jordan Mitchell"
              class="w-full bg-[#0D0D0D] border border-white/5 rounded-full px-5 py-4 text-xs font-mono text-white placeholder-white/20 hover:border-white/10 focus:border-[#FFB6C9]/50 focus:bg-black focus:ring-1 focus:ring-[#FFB6C9]/20 transition-all duration-300 outline-none shadow-inner"
            />
          </div>

          <div>
            <label for="email" class="block text-[9px] font-mono uppercase tracking-widest text-[#FFFFFF]/40 mb-1.5">Email Address</label>
            <input
              type="email"
              id="email"
              required
              placeholder="founder@yourbrand.com"
              class="w-full bg-[#0D0D0D] border border-white/5 rounded-full px-5 py-4 text-xs font-mono text-white placeholder-white/20 hover:border-white/10 focus:border-[#FFB6C9]/50 focus:bg-black focus:ring-1 focus:ring-[#FFB6C9]/20 transition-all duration-300 outline-none shadow-inner"
            />
          </div>

          <div>
            <label for="password" class="block text-[9px] font-mono uppercase tracking-widest text-white/40 mb-1.5">Security Password</label>
            <input
              type="password"
              id="password"
              required
              placeholder="••••••••"
              class="w-full bg-[#0D0D0D] border border-white/5 rounded-full px-5 py-4 text-xs font-mono text-white placeholder-white/20 hover:border-white/10 focus:border-[#FFB6C9]/50 focus:bg-black focus:ring-1 focus:ring-[#FFB6C9]/20 transition-all duration-300 outline-none shadow-inner"
            />
          </div>

          <!-- STATUS & DISPATCH ALERTS -->
          <div id="error-message" class="hidden text-xs text-rose-400 bg-rose-500/5 border border-rose-500/20 px-4 py-3 rounded-full text-center font-medium animate-fade-in font-mono"></div>
          <div id="success-message" class="hidden text-xs text-emerald-400 bg-emerald-500/5 border border-emerald-500/20 px-4 py-3 rounded-full text-center font-medium animate-fade-in font-mono"></div>

          <!-- ACTION BUTTON -->
          <button
            type="submit"
            id="submit-btn"
            class="w-full bg-gradient-to-r from-[#FFB6C9] to-[#F472B6] hover:brightness-110 text-black font-semibold text-xs py-4 rounded-full shadow-[0_0_20px_rgba(255,182,201,0.25)] transition-all duration-300 font-display uppercase tracking-widest cursor-pointer flex items-center justify-center gap-2"
          >
            Create Account
          </button>
        </form>

        <!-- FOOTER SWAPPER LINER -->
        <div class="text-center mt-6">
          <p class="text-xs text-white/40">
            Already registered? 
            <a href="/login.html" class="text-[#FFB6C9] hover:text-[#F472B6] font-medium transition-colors hover:underline">Log in to Console</a>
          </p>
        </div>
      </div>
    </main>

    <!-- Aesthetic Footer info banner -->
    <footer class="relative z-10 px-8 pb-8 flex flex-col sm:flex-row items-center justify-between text-white/20 text-[9px] uppercase tracking-[0.2em] font-medium gap-3">
      <span>&copy; 2026 Wallovo AI Labs</span>
      <div class="flex gap-4 sm:gap-8">
        <span class="font-mono">Secure Direct Node</span>
      </div>
    </footer>

    <!-- LOGIC INTEGRATION script -->
    <script type="module">
      import { supabase, clearSessionAndSignOut } from '/src/lib/supabase.js';

      console.log("VITE_SUPABASE_URL:", import.meta.env.VITE_SUPABASE_URL);
      console.log("VITE_SUPABASE_ANON_KEY:", import.meta.env.VITE_SUPABASE_ANON_KEY);

      // Check existing session on load
      async function autoRedirect() {
        console.log("[Auth] Checking cached session on signup load...");
        try {
          const { data: { session } } = await supabase.auth.getSession();
          if (session) {
            console.log("[Auth] Active session found. Redirecting to dashboard...");
            window.location.href = '/dashboard.html';
          }
        } catch (err) {
          console.error("[Auth] Session check failed on load", err);
        }
      }
      autoRedirect();

      const form = document.getElementById('signup-form');
      const fullNameInput = document.getElementById('full-name');
      const emailInput = document.getElementById('email');
      const passwordInput = document.getElementById('password');
      const submitBtn = document.getElementById('submit-btn');
      const errorDiv = document.getElementById('error-message');
      const successDiv = document.getElementById('success-message');

      function hideMessages() {
        errorDiv.classList.add('hidden');
        successDiv.classList.add('hidden');
      }

      function showError(msg) {
        errorDiv.textContent = msg;
        errorDiv.classList.remove('hidden');
      }

      function showSuccess(msg) {
        successDiv.textContent = msg;
        successDiv.classList.remove('hidden');
      }

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        hideMessages();

        const fullName = fullNameInput.value.trim();
        const email = emailInput.value.trim();
        const password = passwordInput.value;

        if (!fullName || !email || !password) {
          showError("Please fill out all fields.");
          return;
        }

        if (password.length < 6) {
          showError("Weak password — must be at least 6 characters.");
          return;
        }

        // Set loading stats
        submitBtn.disabled = true;
        submitBtn.textContent = "Creating Account...";

        console.log("[Auth] signup start:", email);

        try {
          const signUpPayload = {
            email: email,
            password: password,
            options: {
              data: {
                full_name: fullName,
              }
            }
          };

          const { data, error } = await supabase.auth.signUp(signUpPayload);

          if (error) {
            console.error("[Auth] signup fail:", error);
            showError("Signup Failed: " + error.message);
            submitBtn.disabled = false;
            submitBtn.textContent = "Create Account";
            return;
          }

          if (data && data.user) {
            console.log("[Auth] signup success:", data.user);
            showSuccess("Account created successfully! Forwarding to executive login...");
            
            // Redirect to login page to sign in cleanly as requested
            setTimeout(() => {
              window.location.href = '/login.html';
            }, 1000);
          } else {
            console.warn("[Auth] signup returned empty payload");
            showError("Signup returned empty payload. Please try again.");
            submitBtn.disabled = false;
            submitBtn.textContent = "Create Account";
          }
        } catch (err) {
          console.error("[Auth] signup process exception:", err);
          showError(err.message || "An authentication server exception occurred. Please retry.");
          submitBtn.disabled = false;
          submitBtn.textContent = "Create Account";
        }
      });
    </script>
  </body>
</html>
